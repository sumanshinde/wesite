services:
  - type: web
    name: fixitnow-api
    env: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: static
    name: fixitnow-client
    env: static
    rootDir: .
    plan: free
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: fixitnow-api
          property: url
        value: "${VITE_API_URL}/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
