services:
  - type: web
    name: fixitnow-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: fixitnow-client
    runtime: static
    rootDir: .
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: fixitnow-api
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
